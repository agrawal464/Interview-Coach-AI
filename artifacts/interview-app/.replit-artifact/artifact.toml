kind = "web"
previewPath = "/"
title = "AI Mock Interview"
version = "1.0.0"
id = "artifacts/interview-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25492

[services.development]
run = "pnpm --filter @workspace/interview-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interview-app", "run", "build" ]
publicDir = "artifacts/interview-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25492"
BASE_PATH = "/"
